<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>evryeleven</title>
  <meta name="description" content="evryeleven — creative studio." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=4" />
</head>
<body>
  <!-- poster (instant paint) -->
  <div class="bg" aria-hidden="true"></div>
  <!-- animated scene: clouds refracting through the glass wordmark, seamless gentle ripple -->
  <img class="seq" id="seq" src="assets/scene/h_0001.jpg" alt="evryeleven" decoding="async" />

  <header class="topbar">
    <a class="logo" href="#">E11</a>
    <nav class="nav" aria-label="Primary">
      <a href="#work">Work</a>
      <a href="#about">About</a>
      <a href="#services">Services</a>
      <a href="#contact">Contact</a>
    </nav>
    <button class="menu" type="button" aria-label="Open menu">
      <span class="dot" aria-hidden="true"></span>Menu
    </button>
  </header>

  <footer class="scroll" aria-hidden="true">
    <span class="scroll__label">Scroll</span>
    <svg class="scroll__arrow" width="20" height="34" viewBox="0 0 20 34" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 1V31" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M3 24L10 32L17 24" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </footer>

  <script>
    // ---- seamless scene flipbook (auto-plays, gentle continuous loop) ----
    (function () {
      var FRAMES = 48, FPS = 24;
      var pad = function (n) { return ("0000" + n).slice(-4); };
      var src = function (n) { return "assets/scene/h_" + pad(n) + ".jpg"; };

      var el = document.getElementById("seq");
      var imgs = [], loaded = 0;
      for (var i = 1; i <= FRAMES; i++) {
        var im = new Image();
        im.onload = function () { loaded++; };
        im.src = src(i);
        imgs.push(im);
      }

      var reduce = window.matchMedia &&
                   window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      var frame = 0, last = 0, interval = 1000 / FPS;
      function tick(t) {
        if (!last) last = t;
        if (t - last >= interval) {
          last = t;
          frame = (frame + 1) % FRAMES;        // continuous; frame 48 -> 1 is seamless
          if (imgs[frame].complete) el.src = imgs[frame].src;
        }
        requestAnimationFrame(tick);
      }
      function start() {
        if (reduce) { el.src = src(1); return; }
        if (loaded >= Math.min(12, FRAMES)) requestAnimationFrame(tick);
        else setTimeout(start, 100);
      }
      start();
    })();
  </script>
</body>
</html>
